<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Function Debug</title>
  <style>body{font-family:Arial;padding:24px;background:#111;color:#eee}pre{white-space:pre-wrap;background:#222;padding:16px;border-radius:8px}</style>
</head>
<body>
  <h2>Debug /api/user/info</h2>
  <pre id="out">loading...</pre>
  <script>
    fetch('/api/user/info', { credentials: 'include' })
      .then(async r => {
        const text = await r.text();
        document.getElementById('out').textContent = 'status: ' + r.status + '\n\n' + text;
      })
      .catch(err => {
        document.getElementById('out').textContent = 'fetch error: ' + err.message;
      })
  </script>
</body>
</html>
